<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MATTBEAR — HiberNation</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@300;600;800&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background:
    radial-gradient(circle at center, #081018 0%, #000 70%),
    linear-gradient(180deg, #000, #02040a);
  color: #e8f3ff;
  font-family: 'Orbitron', sans-serif;
  display: flex;
  justify-content: center;
}

.container {
  max-width: 920px;
  padding: 40px 20px 80px;
  text-align: center;
}

h1 {
  font-family: 'Playfair Display', serif;
  font-size: 3rem;
  letter-spacing: 10px;
  margin: 0;
}

.mantra {
  margin-top: 14px;
  letter-spacing: 3px;
  opacity: 0.9;
}

.card {
  margin-top: 36px;
  padding: 24px 18px;
  border-radius: 16px;
  border: 1px solid rgba(255,255,255,0.18);
  background: rgba(255,255,255,0.05);
  box-shadow: 0 0 40px rgba(0,255,210,0.18);
}

.card h2 {
  margin: 0 0 12px;
  letter-spacing: 4px;
}

.links a {
  display: block;
  margin: 10px 0;
  padding: 14px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.18);
  background: rgba(255,255,255,0.06);
  color: #e8f3ff;
  text-decoration: none;
  letter-spacing: 2px;
}

.links a:hover {
  background: rgba(255,255,255,0.1);
  box-shadow: 0 0 25px rgba(0,255,210,0.35);
}

.burns img {
  margin-top: 16px;
  width: 180px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.2);
}

.small {
  opacity: 0.7;
  font-size: 0.85rem;
}

input, select, textarea {
  width: 100%;
  padding: 12px;
  margin-top: 6px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.2);
  background: rgba(0,0,0,0.4);
  color: #fff;
  font-family: inherit;
}

textarea { resize: vertical; min-height: 80px; }

button {
  margin-top: 14px;
  padding: 14px;
  border-radius: 12px;
  border: 1px solid rgba(0,255,210,0.4);
  background: rgba(0,255,210,0.12);
  color: #fff;
  letter-spacing: 2px;
  cursor: pointer;
}

button:hover {
  background: rgba(0,255,210,0.2);
}

table {
  width: 100%;
  margin-top: 16px;
  border-collapse: collapse;
}

th, td {
  padding: 12px;
  border-bottom: 1px solid rgba(255,255,255,0.15);
  text-align: left;
}

th { opacity: 0.8; }

.footer {
  margin-top: 60px;
  opacity: 0.5;
  font-size: 0.8rem;
}
</style>
</head>

<body>
<div class="container">

  <h1>MATTBEAR</h1>
  <div class="mantra">Wake Up. Stay Up. HiberNation.</div>

  <div class="burns">
    <img src="https://media0.giphy.com/media/8fen5LSZcHQ5O/200w.gif" alt="Mr Burns Excellent">
  </div>

  <!-- LISTEN -->
  <div class="card">
    <h2>LISTEN</h2>

    <!-- SOUNDCloud PLAYER -->
    <iframe
      width="100%"
      height="300"
      scrolling="no"
      frameborder="no"
      allow="autoplay"
      src="https://w.soundcloud.com/player/?url=https%3A//soundcloud.com/mattbear86&color=%2300ffd2&auto_play=false&show_artwork=true">
    </iframe>

    <div class="links">
      <a href="https://suno.com/@mattbear86" target="_blank">SUNO</a>
      <a href="https://soundcloud.com/mattbear86" target="_blank">SOUNDCLOUD</a>
      <a href="https://bearicide.github.io/mattbear86-allfalldown" target="_blank">ALL FALL DOWN</a>
    </div>
  </div>

  <!-- ROSTER -->
  <div class="card">
    <h2>HIBERNATION ROSTER</h2>
    <div class="small">Add yourself to the awakened sleepers.</div>

    <input id="name" placeholder="Display name">

    <input id="handle" placeholder="@handle / platform">

    <select id="trust">
      <option value="1">1 — mysterious</option>
      <option value="2">2 — quiet</option>
      <option value="3" selected>3 — normal human</option>
      <option value="4">4 — reliable</option>
      <option value="5">5 — certified legend</option>
    </select>

    <textarea id="note" placeholder="Optional message"></textarea>

    <button onclick="add()">ADD TO ROSTER</button>
  </div>

  <div class="card">
    <h2>AWAKENED SLEEPERS</h2>

    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Handle</th>
          <th>Trust</th>
          <th>Message</th>
        </tr>
      </thead>
      <tbody id="list"></tbody>
    </table>
  </div>

  <div class="footer">
    MATTBEAR • HiberNation HQ
  </div>

</div>

<script>
const KEY = "hibernation_roster";

function load() {
  return JSON.parse(localStorage.getItem(KEY) || "[]");
}

function save(data) {
  localStorage.setItem(KEY, JSON.stringify(data));
}

function render() {
  const data = load();
  const tbody = document.getElementById("list");
  tbody.innerHTML = "";

  data.forEach(r => {
    tbody.innerHTML += `
      <tr>
        <td><strong>${escape(r.name)}</strong></td>
        <td>${escape(r.handle)}</td>
        <td>${r.trust}</td>
        <td>${escape(r.note)}</td>
      </tr>`;
  });
}

function add() {
  const name = document.getElementById("name").value.trim();
  if (!name) return;

  const entry = {
    name,
    handle: document.getElementById("handle").value,
    trust: document.getElementById("trust").value,
    note: document.getElementById("note").value
  };

  const data = load();
  data.unshift(entry);
  save(data);

  document.getElementById("name").value = "";
  document.getElementById("handle").value = "";
  document.getElementById("note").value = "";

  render();
}

function escape(s) {
  return String(s)
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;");
}

render();
</script>

</body>
</html>
