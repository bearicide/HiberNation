<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>hibernation | sunday transmission</title>
<style>
body{margin:0;background:#050607;color:#e9ffe9;font-family:system-ui}
.wrap{max-width:980px;margin:auto;padding:20px}
.card{background:rgba(10,12,14,.7);border:1px solid rgba(120,255,120,.25);
border-radius:20px;padding:16px;box-shadow:0 20px 60px rgba(0,0,0,.6)}
h1{margin:.2em 0;text-transform:lowercase}
audio{width:100%;margin-top:10px}
canvas{width:100%;height:180px;background:#000;border-radius:14px;margin-top:12px}
button{background:#39ff14;border:none;padding:12px 16px;border-radius:999px;
font-weight:700;cursor:pointer}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <h1>hibernation — sunday transmission</h1>
    <button id="uploadBtn">upload / preview audio</button>
    <input id="file" type="file" accept="audio/*" hidden>
    <audio id="player" controls></audio>
    <canvas id="viz"></canvas>
  </div>
</div>

<script>
const fileInput=document.getElementById('file');
const btn=document.getElementById('uploadBtn');
const audio=document.getElementById('player');
const canvas=document.getElementById('viz');
const ctx=canvas.getContext('2d');

btn.onclick=()=>fileInput.click();

fileInput.onchange=e=>{
  const f=e.target.files[0];
  if(!f)return;
  audio.src=URL.createObjectURL(f);
  audio.play();
};

const audioCtx=new (window.AudioContext||window.webkitAudioContext)();
const src=audioCtx.createMediaElementSource(audio);
const analyser=audioCtx.createAnalyser();
src.connect(analyser);
analyser.connect(audioCtx.destination);
analyser.fftSize=256;

const data=new Uint8Array(analyser.frequencyBinCount);

function draw(){
  requestAnimationFrame(draw);
  analyser.getByteFrequencyData(data);
  ctx.fillStyle="#000";
  ctx.fillRect(0,0,canvas.width,canvas.height);
  const w=canvas.width/data.length;
  for(let i=0;i<data.length;i++){
    const h=data[i];
    ctx.fillStyle="#39ff14";
    ctx.fillRect(i*w,canvas.height-h,w-1,h);
  }
}
audio.onplay=()=>audioCtx.resume();
draw();
</script>
</body>
</html>
