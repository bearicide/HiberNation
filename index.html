<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>MATTBEAR — ALL FALL DOWN</title>
<style>
body{margin:0;background:#070504;color:#f3eee6;font-family:Arial,sans-serif;overflow-x:hidden;background-image:radial-gradient(circle at top,#3a2d16,transparent 40%)}
.hero{min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:24px}
.logo{font-size:clamp(3rem,10vw,7rem);font-weight:900;letter-spacing:.12em;color:#e0bf7a;text-shadow:0 0 20px rgba(224,191,122,.3)}
.sub{letter-spacing:.4em;color:#bba98d;text-transform:uppercase}
.btn{margin-top:30px;padding:18px 32px;border-radius:999px;border:1px solid rgba(224,191,122,.3);background:#16110b;color:#fff;font-weight:700;text-decoration:none}
.wrap{width:min(1300px,calc(100% - 30px));margin:auto;padding-bottom:100px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.panel{background:rgba(0,0,0,.35);border:1px solid rgba(224,191,122,.2);border-radius:24px;padding:18px}
iframe{width:100%;border:none;border-radius:16px;background:#000}
.sc{height:520px}.suno{height:520px}
.game{margin-top:40px;background:#050403;border:1px solid rgba(224,191,122,.2);border-radius:24px;padding:20px}
canvas{width:100%;height:650px;background:#080604;border-radius:16px;display:block}
@media(max-width:900px){.grid{grid-template-columns:1fr}.sc,.suno{height:420px}}
</style>
</head>
<body>
<section class="hero">
<div class="logo">.MATTBEAR.</div>
<div class="sub">ALL FALL DOWN</div>
<a class="btn" href="#portal">ENTER THE RUINS</a>
</section>
<div class="wrap" id="portal">
<div class="grid">
<div class="panel">
<h2>SoundCloud Archive</h2>
<iframe class="sc" allow="autoplay" src="https://w.soundcloud.com/player/?url=https%3A//soundcloud.com/mattbear86/sets/allfalldown&color=%23d6b16a&auto_play=false&hide_related=false&show_comments=true&show_user=true&show_reposts=false&visual=false"></iframe>
</div>
<div class="panel">
<h2>Suno Portal</h2>
<iframe class="suno" src="https://suno.com/@mattbear86"></iframe>
</div>
</div>
<div class="game">
<h2>DESCENT</h2>
<canvas id="game" width="1200" height="650"></canvas>
</div>
</div>
<script>
const c=document.getElementById('game');const x=c.getContext('2d');
const p={x:600,y:320,s:16};const k={};let score=0;
document.addEventListener('keydown',e=>k[e.key]=1);document.addEventListener('keyup',e=>k[e.key]=0);
const shards=[];for(let i=0;i<25;i++)shards.push({x:Math.random()*1180+10,y:Math.random()*630+10,a:1});
function loop(){x.fillStyle='#060504';x.fillRect(0,0,1200,650);
for(let i=0;i<120;i++){x.fillStyle='rgba(255,255,255,.03)';x.fillRect(Math.random()*1200,Math.random()*650,2,2)}
if(k['w']||k['ArrowUp'])p.y-=4;if(k['s']||k['ArrowDown'])p.y+=4;if(k['a']||k['ArrowLeft'])p.x-=4;if(k['d']||k['ArrowRight'])p.x+=4;
shards.forEach(s=>{if(s.a){x.beginPath();x.arc(s.x,s.y,6,0,Math.PI*2);x.fillStyle='#d6b16a';x.fill();let dx=p.x-s.x,dy=p.y-s.y;if(Math.sqrt(dx*dx+dy*dy)<20){s.a=0;score++}}});
x.beginPath();x.arc(p.x,p.y,p.s,0,Math.PI*2);x.fillStyle='#fff';x.fill();
x.fillStyle='#d6b16a';x.font='22px Arial';x.fillText('SIGNAL SHARDS: '+score+'/25',20,40);
if(score===25){x.font='52px Georgia';x.fillText('STILL HERE.',450,330)}
requestAnimationFrame(loop)}loop();
</script>
</body>
</html>
