<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redirecting to MATTBEAR</title>
<meta name="description" content="HiberNation now routes to the main MATTBEAR portal.">
<meta name="robots" content="noindex,follow">
<link rel="canonical" href="https://bearicide.github.io/">
<meta http-equiv="refresh" content="0; url=https://bearicide.github.io/">
<script>
  window.location.replace('https://bearicide.github.io/');
</script>
<style>
  :root {
    --bg: #05070c;
    --text: #eef6ff;
    --muted: #b7c7d8;
    --line: rgba(255,255,255,.16);
    --grad: linear-gradient(90deg,#ff3a6d,#ff9f1c,#ffd93d,#39ff92,#35d9ff,#5a7cff,#cf5cff);
  }
  * { box-sizing: border-box; }
  body {
    min-height: 100vh;
    margin: 0;
    display: grid;
    place-items: center;
    background: radial-gradient(circle at top left, rgba(53,217,255,.18), transparent 30%),
                radial-gradient(circle at bottom right, rgba(207,92,255,.16), transparent 30%),
                var(--bg);
    color: var(--text);
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    text-align: center;
    padding: 24px;
  }
  main {
    width: min(620px, 100%);
    padding: 32px;
    border: 1px solid var(--line);
    border-radius: 28px;
    background: rgba(255,255,255,.055);
    box-shadow: 0 24px 70px rgba(0,0,0,.45);
  }
  h1 {
    margin: 0 0 12px;
    font-size: clamp(2rem, 8vw, 4rem);
    line-height: .95;
    text-transform: uppercase;
    letter-spacing: .04em;
    background: var(--grad);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  p { color: var(--muted); line-height: 1.6; }
  a {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-top: 14px;
    min-height: 48px;
    padding: 12px 18px;
    border-radius: 16px;
    background: var(--grad);
    color: #05070c;
    font-weight: 900;
    text-decoration: none;
    text-transform: uppercase;
    letter-spacing: .06em;
  }
</style>
</head>
<body>
<main>
  <h1>Wake Up.<br>Stay Up.</h1>
  <p>HiberNation now routes to the main MATTBEAR portal.</p>
  <p>If the redirect does not happen automatically, use the button below.</p>
  <a href="https://bearicide.github.io/">Go to bearicide.github.io</a>
</main>
</body>
</html>
