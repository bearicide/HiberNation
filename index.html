<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>hibernation | sunday transmission</title>

<style>
:root{
  --bg:#050607;
  --panel:rgba(10,12,14,.72);
  --edge:rgba(120,255,120,.22);
  --text:#e9ffe9;
  --muted:rgba(233,255,233,.72);
  --neon:#39ff14;
  --neon2:#00ffd5;
}

body{
  margin:0;
  background:
    radial-gradient(900px 500px at 70% -10%, rgba(57,255,20,.15), transparent 55%),
    radial-gradient(900px 600px at 10% 0%, rgba(0,255,213,.12), transparent 60%),
    linear-gradient(#040506,#020203);
  color:var(--text);
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
}

.wrap{
  max-width:980px;
  margin:auto;
  padding:20px;
}

.card{
  background:var(--panel);
  border:1px solid var(--edge);
  border-radius:22px;
  padding:18px;
  box-shadow:0 30px 80px rgba(0,0,0,.7);
}

h1{
  margin:.2em 0;
  text-transform:lowercase;
  letter-spacing:.05em;
}

.sub{
  color:var(--muted);
  margin-bottom:12px;
}

button{
  background:var(--neon);
  color:#000;
  border:none;
  padding:12px 16px;
  border-radius:999px;
  font-weight:800;
  cursor:pointer;
}

audio{
  width:100%;
  margin-top:12px;
}

canvas{
  width:100%;
  height:220px;
  background:#000;
  border-radius:16px;
  margin-top:14px;
  box-shadow:0 0 40px rgba(57,255,20,.25);
}

footer{
  margin-top:14px;
  font-size:12px;
  color:var(--muted);
  text-align:center;
}
</style>
</head>

<body>
<div class="wrap">
  <div class="card">

    <h1>hibernation — sunday transmission</h1>
    <div class="sub">live audio visualizer | local preview | max mode</div>

    <button id="uploadBtn">upload / preview audio</button>
    <input id="file" type="file" accept="audio/*" hidden>

    <audio id="player" controls></audio>
    <canvas id="viz"></canvas>

    <footer>tap play to awaken the machine</footer>

  </div>
</div>

<script>
const fileInput = document.getElementById('file');
const btn = document.getElementById('uploadBtn');
const audio = document.getElementById('player');
const canvas = document.getElementById('viz');
const ctx = canvas.getContext('2d');

btn.onclick = () => fileInput.click();

fileInput.onchange = e => {
  const f = e.target.files[0];
  if (!f) return;
  audio.src = URL.createObjectURL(f);
  audio.play();
};

// Audio setup
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const src = audioCtx.createMediaElementSource(audio);
const analyser = audioCtx.createAnalyser();
src.connect(analyser);
analyser.connect(audioCtx.destination);

analyser.fftSize = 512;
const freqData = new Uint8Array(analyser.frequencyBinCount);
const timeData = new Uint8Array(analyser.frequencyBinCount);

// Particle field
const particles = [];
for (let i = 0; i < 120; i++) {
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    vx: (Math.random() - 0.5) * 1.2,
    vy: (Math.random() - 0.5) * 1.2
  });
}

function draw() {
  requestAnimationFrame(draw);

  analyser.getByteFrequencyData(freqData);
  analyser.getByteTimeDomainData(timeData);

  // Clear
  ctx.fillStyle = "#000";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const w = canvas.width / freqData.length;

  // Spectrum bars
  for (let i = 0; i < freqData.length; i++) {
    const h = freqData[i] * 0.9;
    ctx.fillStyle = "#39ff14";
    ctx.fillRect(i * w, canvas.height - h, w - 1, h);
  }

  // Waveform
  ctx.strokeStyle = "#00ffd5";
  ctx.lineWidth = 2;
  ctx.beginPath();
  for (let i = 0; i < timeData.length; i++) {
    const y = (timeData[i] / 255) * canvas.height;
    const x = (i / timeData.length) * canvas.width;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.stroke();

  // Pulse ring
  const avg = freqData.reduce((a, b) => a + b) / freqData.length;
  ctx.strokeStyle = "rgba(57,255,20,0.5)";
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.arc(canvas.width/2, canvas.height/2, 40 + avg * 0.15, 0, Math.PI * 2);
  ctx.stroke();

  // Particles
  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
    if (p.y < 0 || p.y > canvas.height) p.vy *= -1;

    ctx.fillStyle = "rgba(57,255,20,0.7)";
    ctx.fillRect(p.x, p.y, 2, 2);
  });
}

audio.onplay = () => audioCtx.resume();
draw();
</script>

</body>
</html>
