<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MATTBEAR — HiberNation</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@300;500;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background:
    radial-gradient(circle at center, #081018 0%, #000 70%);
  color: #eaf3ff;
  font-family: 'Orbitron', sans-serif;
  display: flex;
  justify-content: center;
}

.container {
  max-width: 920px;
  padding: 24px 16px 80px;
  text-align: center;
}

.hero img {
  width: 100%;
  border-radius: 18px;
  box-shadow: 0 0 60px rgba(0,255,210,0.25);
}

h1 {
  font-family: 'Playfair Display', serif;
  font-size: 2.6rem;
  letter-spacing: 8px;
  margin: 20px 0 6px;
}

.mantra {
  letter-spacing: 3px;
  opacity: 0.9;
  margin-bottom: 18px;
}

.card {
  margin-top: 28px;
  padding: 20px 16px;
  border-radius: 16px;
  border: 1px solid rgba(255,255,255,0.18);
  background: rgba(255,255,255,0.05);
  box-shadow: 0 0 40px rgba(0,255,210,0.18);
}

.card h2 {
  margin: 0 0 14px;
  letter-spacing: 4px;
}

.links a {
  display: block;
  margin: 10px 0;
  padding: 14px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.18);
  background: rgba(255,255,255,0.06);
  color: #eaf3ff;
  text-decoration: none;
  letter-spacing: 2px;
}

.links a:hover {
  background: rgba(255,255,255,0.1);
  box-shadow: 0 0 25px rgba(0,255,210,0.35);
}

iframe {
  width: 100%;
  border: 0;
  border-radius: 12px;
}

.burns img {
  width: 150px;
  margin-top: 14px;
  border-radius: 12px;
}

.footer {
  margin-top: 50px;
  opacity: 0.5;
  font-size: 0.8rem;
}
</style>
</head>

<body>
<div class="container">

  <!-- HERO IMAGE -->
  <div class="hero">
    <img src="algorithm-nation.png" alt="Algorithm Nation">
  </div>

  <h1>MATTBEAR</h1>
  <div class="mantra">Wake Up. Stay Up. HiberNation.</div>

  <!-- MR BURNS -->
  <div class="burns">
    <img src="https://media0.giphy.com/media/8fen5LSZcHQ5O/200w.gif" alt="Excellent">
  </div>

  <!-- LISTEN -->
  <div class="card">
    <h2>LISTEN</h2>

    <!-- SoundCloud player for mattbear86 -->
    <iframe
      height="320"
      scrolling="no"
      allow="autoplay"
      src="https://w.soundcloud.com/player/?url=https%3A//soundcloud.com/mattbear86&auto_play=false&show_artwork=true&visual=true">
    </iframe>

    <div class="links">
      <a href="https://suno.com/@mattbear86" target="_blank">SUNO</a>
      <a href="https://soundcloud.com/mattbear86" target="_blank">SOUNDCLOUD</a>
      <a href="https://bearicide.github.io/mattbear-allfalldown" target="_blank">ALL FALL DOWN</a>
    </div>
  </div>

  <!-- HIBERNATION ROSTER (SHARED) -->
  <div class="card">
    <h2>HIBERNATION ROSTER</h2>

    <!-- ADD YOURSELF -->
    <iframe
      src="https://docs.google.com/forms/d/e/1FAIpQLSd5QLpUNQ0To0WP7oTrYO8r4hClPhvNYARo3SBm4xG5GbrSyw/viewform?embedded=true"
      height="1200">
      Loading…
    </iframe>
  </div>

  <div class="footer">
    MATTBEAR • HiberNation HQ
  </div>

</div>
</body>
</html>
